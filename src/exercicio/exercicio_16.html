<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            width: 300px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card h2 {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
        }

    </style>
</head>

<body>

    <div class="card">

        <img src="https://picsum.photos/200" alt="Foto de perfil">

        <h2>Victor Dias</h2>

        <p>
            Estudante de programação e desenvolvimento web.
        </p>

    </div>

</body>
</html>
