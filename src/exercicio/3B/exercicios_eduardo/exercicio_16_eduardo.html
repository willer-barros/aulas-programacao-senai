<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 16</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .card {
            background-color: #fff;
            width: 300px;
            padding: 32px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid #e0e0e0;
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #222;
        }

        .card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.pravatar.cc/100" alt="Foto de perfil">
        <h2>João Silva</h2>
        <p>Desenvolvedor web apaixonado por tecnologia e café. Sempre aprendendo algo novo.</p>
    </div>
</body>
</html>
