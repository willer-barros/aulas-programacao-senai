<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            padding: 32px;
            font-family: Arial, sans-serif;
        }

        section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .foto {
            width: 150px;
            height: 150px;
            border-radius: 8px;
        }

        .foto:nth-child(1) { background-color: #e74c3c; }
        .foto:nth-child(2) { background-color: #3498db; }
        .foto:nth-child(3) { background-color: #2ecc71; }
        .foto:nth-child(4) { background-color: #f39c12; }
        .foto:nth-child(5) { background-color: #9b59b6; }
    </style>
</head>
<body>
    <section>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
    </section>
</body>
</html>
