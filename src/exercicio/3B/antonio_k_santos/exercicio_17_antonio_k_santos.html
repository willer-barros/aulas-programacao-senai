<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17 - Galeria Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            padding: 40px;
            font-family: sans-serif;
        }

        section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .foto {
            width: 180px;
            height: 180px;
            border-radius: 8px;
        }

        .foto:nth-child(1) { background-color: #e63946; }
        .foto:nth-child(2) { background-color: #457b9d; }
        .foto:nth-child(3) { background-color: #2a9d8f; }
        .foto:nth-child(4) { background-color: #e9c46a; }
        .foto:nth-child(5) { background-color: #f4a261; }
    </style>
</head>
<body>
    <section>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
        <div class="foto"></div>
    </section>
</body>
</html>
