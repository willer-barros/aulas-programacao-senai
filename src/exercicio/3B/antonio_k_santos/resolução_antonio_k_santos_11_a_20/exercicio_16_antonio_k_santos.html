<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 16 - Card de Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            font-family: Georgia, serif;
        }

        .card {
            width: 300px;
            background: #fff;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }

        .card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #e0e0e0;
        }

        .card h2 {
            font-size: 1.4rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.pravatar.cc/150?img=12" alt="Foto de perfil">
        <h2>Maria Silva</h2>
        <p>Desenvolvedora web apaixonada por tecnologia, café e boas ideias que viram código.</p>
    </div>
</body>
</html>
