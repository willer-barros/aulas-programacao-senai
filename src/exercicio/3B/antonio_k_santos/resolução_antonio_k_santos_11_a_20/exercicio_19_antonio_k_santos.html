<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 19 - Formulário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .formulario {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 420px;
        }

        .formulario h2 {
            margin-bottom: 28px;
            font-size: 1.3rem;
            color: #222;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: none;
            border-bottom: 2px solid #ccc;
            background: transparent;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            border-color: #457b9d;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #457b9d;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #1d4e6f;
        }
    </style>
</head>
<body>
    <div class="formulario">
        <h2>Fale conosco</h2>
        <label>Nome</label>
        <input type="text" placeholder="Seu nome">
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com">
        <label>Mensagem</label>
        <textarea placeholder="Escreva sua mensagem..."></textarea>
        <button>Enviar</button>
    </div>
</body>
</html>
