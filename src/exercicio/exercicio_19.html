<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — Exercício 19</title>
  <link rel="stylesheet" href="style_19.css">
</head>
<body>

  <div class="page">
    <div class="form-wrap">

      <div class="form-header">
        <span class="eyebrow">Fale Conosco</span>
        <h1 class="form-title">Entre em Contato</h1>
        <p class="form-desc">Respondemos em até 24 horas úteis.</p>
      </div>

      <form class="contact-form" id="contact-form" novalidate>

        <div class="field-row">
          <div class="field">
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder=" "
              autocomplete="name"
              required>
            <label for="nome">Nome completo</label>
            <span class="field-error">Campo obrigatório</span>
          </div>
          <div class="field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder=" "
              autocomplete="email"
              required>
            <label for="email">E-mail</label>
            <span class="field-error">E-mail inválido</span>
          </div>
        </div>

        <div class="field">
          <input
            type="text"
            id="assunto"
            name="assunto"
            placeholder=" "
            required>
          <label for="assunto">Assunto</label>
          <span class="field-error">Campo obrigatório</span>
        </div>

        <div class="field">
          <textarea
            id="mensagem"
            name="mensagem"
            placeholder=" "
            rows="5"
            required></textarea>
          <label for="mensagem">Mensagem</label>
          <span class="field-error">Campo obrigatório</span>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span class="btn-text">Enviar Mensagem</span>
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="btn-spinner" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"
              stroke-dasharray="22" stroke-dashoffset="22" stroke-linecap="round"/>
          </svg>
        </button>

      </form>

      <div class="form-success" id="form-success" aria-live="polite">
        <div class="success-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M5 14l6 6 12-12" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="success-title">Mensagem enviada!</h2>
        <p class="success-desc">Entraremos em contato em breve.</p>
        <button class="reset-btn" id="reset-btn">Enviar outra mensagem</button>
      </div>

    </div>
  </div>

  <script src="exercicio_19.js"></script>
</body>
</html>
