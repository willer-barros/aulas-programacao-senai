<!DOCTYPE html>
<html>
<head>
    <title>Exercicio 19</title>
    <style>
        
        input, textarea {
            width: 100%;
            margin-bottom: 10px;
            border: none;            
            background-color: #f0f0f0; 
            outline: none;           
            transition: 0.3s;         
        }

        input:focus, textarea:focus {
            outline: 2px solid blue;  
        }

        button {
            background-color: gray;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;        
        }

        button:hover {
            background-color: black;
        }
    </style>
</head>
<body>

    <form style="max-width: 300px; margin: 20px auto;">
        <label>Nome:</label>
        <input type="text">

        <label>E-mail:</label>
        <input type="email">

        <label>Mensagem:</label>
        <textarea rows="4"></textarea>

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
