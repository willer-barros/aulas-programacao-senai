<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Exercicio 19 - Formulário de Mensagens</title>
	<link rel="stylesheet" href="exercicio_19.css">
</head>
<body>
	<main class="container">
		<header>
			<h1>Fale Conosco</h1>
			<p class="lead">Envie sua mensagem usando o formulário abaixo.</p>
		</header>

		<form class="message-form" action="#" method="post" novalidate>
			<div class="form-group">
				<label for="name">Nome</label>
				<input id="name" name="name" type="text" placeholder="Seu nome" required>
			</div>

			<div class="form-group">
				<label for="email">E‑mail</label>
				<input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>
			</div>

			<div class="form-group">
				<label for="message">Mensagem</label>
				<textarea id="message" name="message" rows="6" placeholder="Escreva sua mensagem..." required></textarea>
			</div>

			<button type="submit" class="btn-submit">Enviar mensagem</button>
		</form>
	</main>
</body>
</html>
