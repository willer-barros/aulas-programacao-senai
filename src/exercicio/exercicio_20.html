<!DOCTYPE html>
<html>
<head>
    <title>Exercicio 20</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 20px auto;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
        }

        .destaque {
            border: 2px solid blue;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <h3>Plano virgem</h3>
            <p>R$ 29/mês</p>
            <ul>
                <li>Direito a revista e videos</li>
                <li>Suporte por email</li>
            </ul>
        </div>

        <div class="card destaque">
            <h3>Plano prazer</h3>
            <p>R$ 59/mês</p>
            <ul>
                <li>Direito a 1 tra.., revista e videos</li>
                <li>Suporte 24h</li>
            </ul>
        </div>

        <div class="card">
            <h3>Plano basilio</h3>
            <p>R$ 99/mês</p>
            <ul>
                <li>TUDO ILIMITADO</li>
                <li>Suporte VIP</li>
            </ul>
        </div>

    </div>

</body>
</html>
