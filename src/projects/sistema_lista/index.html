<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Lista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Iniciei Projeto </h1>
    <div class="container">
        <!-- transformei em form para permitir Enter -->
        <form id="form-nome" action="#" onsubmit="return false;">
            <input type="text" id="nomeAluno" placeholder="Nome do Aluno" autocomplete="off">
            <button id="btn-enviar" type="button">Enviar</button>
        </form>
        <ul id="lista"></ul>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
